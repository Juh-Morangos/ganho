<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Lançamentos</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #1a73e8; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        main { max-width: 1200px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .controles { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        .controles-acoes { display: flex; gap: 10px; }
        
        .btn { border: none; padding: 10px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; color: white; }
        .btn-novo { background-color: #34a853; }
        .btn-novo:hover { background-color: #2d8e47; }
        .btn-fornecedor { background-color: #fbbc05; color: #333; }
        .btn-imprimir { background-color: #6c757d; }
        .btn-salvar { background-color: #1a73e8; width: 100%; padding: 12px; margin-top: 10px; }
        
        .btn-acao { padding: 5px 10px; font-size: 13px; margin-right: 5px; border-radius: 4px; border: none; cursor: pointer; color: white;}
        .btn-editar { background-color: #fbbc05; color: #333;}
        .btn-excluir { background-color: #ea4335; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }

        /* Estilo para as caixinhas de seleção */
        .chk-col { text-align: center; width: 40px; }
        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 25px; width: 90%; border-radius: 12px; position: relative; animation: fadeIn 0.3s; }
        .modal-lancamento { max-width: 600px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #3c4043; font-size: 14px; }
        .form-group input { width: 100%; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.3); }
        
        .info-busca { display: block; font-size: 12px; color: #1a73e8; margin-top: 4px; min-height: 16px; font-weight: 500; }
        
        .resultado-lucro { background-color: #e6f4ea; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #34a853; font-size: 16px; text-align: center; }
        .lucro-negativo { background-color: #fce8e6; border-left-color: #ea4335; }

        .manter-dados-container {
            grid-column: span 2; background: #f8f9fa; padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 10px; border: 1px dashed #ccc; margin-bottom: 5px;
        }
        .manter-dados-container input { width: auto; cursor: pointer; }

        .lista-fornecedores { max-height: 200px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .item-fornecedor { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
        .item-fornecedor button { background: none; border: none; color: #ea4335; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Sistema de Lançamentos</h1>
    </header>

    <main>
        <div class="controles">
            <div>
                <label for="filtroData"><strong>Data de Consulta:</strong></label>
                <input type="date" id="filtroData" onchange="renderizarTabela()">
            </div>
            <div class="controles-acoes">
                <button class="btn btn-imprimir" onclick="imprimirSelecionados()">🖨️ Imprimir Selecionados</button>
                <button class="btn btn-fornecedor" onclick="abrirModalFornecedor()">👥 Fornecedores</button>
                <button class="btn btn-novo" onclick="abrirModal(null)">+ Novo Lançamento</button>
            </div>
        </div>

        <table id="tabelaLancamentos">
            <thead>
                <tr>
                    <th class="chk-col">
                        <input type="checkbox" id="chkTodos" onchange="selecionarTodos()">
                    </th>
                    <th>Data</th>
                    <th>Fornecedor</th>
                    <th>Produto</th>
                    <th>Custo</th>
                    <th>Venda</th>
                    <th>Gastos</th>
                    <th>Lucro</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaItens"></tbody>
        </table>
    </main>

    <div id="modalLancamento" class="modal">
        <div class="modal-content modal-lancamento">
            <span class="close" onclick="fecharModal('modalLancamento')">&times;</span>
            <h2 id="tituloModalLancamento" style="margin-top: 0;">Lançar Item</h2>
            
            <form id="formLancamento">
                <input type="hidden" id="editIndex" value="">
                
                <div class="form-grid">
                    <div class="manter-dados-container">
                        <input type="checkbox" id="manterDados" checked>
                        <label for="manterDados" style="cursor:pointer; margin:0; font-size: 13px;">
                            <strong>Modo Contínuo:</strong> Manter Data e Fornecedor após lançar
                        </label>
                    </div>

                    <div class="form-group full-width">
                        <label>Data:</label>
                        <input type="date" id="dataLancamento" class="campo-nav" required>
                    </div>

                    <div class="form-group">
                        <label>Cód. Fornecedor:</label>
                        <input type="text" id="codFornecedor" class="campo-nav" placeholder="Ex: 1" onblur="buscarFornecedor()">
                        <span class="info-busca" id="nomeFornecedor"></span>
                    </div>

                    <div class="form-group">
                        <label>Cód. Produto (Planilha):</label>
                        <input type="text" id="codProduto" class="campo-nav" placeholder="Digite o código" onblur="buscarProduto()">
                        <span class="info-busca" id="nomeProduto"></span>
                    </div>

                    <div class="form-group">
                        <label>Preço Venda (R$):</label>
                        <input type="number" id="precoVenda" class="campo-nav" step="0.01" oninput="calcularLucro()">
                    </div>

                    <div class="form-group">
                        <label>Preço de Custo (R$):</label>
                        <input type="number" id="precoCusto" class="campo-nav" step="0.01" oninput="calcularLucro()">
                    </div>

                    <div class="form-group full-width">
                        <label>Gastos Extras (R$):</label>
                        <input type="number" id="gastos" class="campo-nav" step="0.01" value="0" oninput="calcularLucro()">
                    </div>
                </div>

                <div id="boxLucro" class="resultado-lucro full-width">
                    Lucro: <strong>R$ <span id="valorLucro">0.00</span></strong>
                </div>

                <button type="button" class="btn btn-salvar campo-nav" onclick="salvarLancamento()">Confirmar Lançamento</button>
            </form>
        </div>
    </div>

    <div id="modalFornecedores" class="modal">
        <div class="modal-content modal-fornecedor">
            <span class="close" onclick="fecharModal('modalFornecedores')">&times;</span>
            <h2 style="margin-top: 0;">Cadastro de Fornecedores</h2>
            <div class="form-grid">
                <div class="form-group"><label>Código:</label><input type="text" id="novoCadCodigo"></div>
                <div class="form-group"><label>Nome:</label><input type="text" id="novoCadNome"></div>
            </div>
            <button class="btn btn-novo" style="width:100%; margin-top:10px;" onclick="salvarNovoFornecedor()">Gravar Fornecedor</button>
            <div class="lista-fornecedores" id="listaFornecedoresModal"></div>
        </div>
    </div>

    <script>
        const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
        const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;

        let listaProdutos = [];
        let fornecedoresCadastrados = JSON.parse(localStorage.getItem('fornecedores')) || [];
        let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];

        window.onload = () => {
            carregarProdutos();
            document.getElementById('filtroData').value = new Date().toISOString().split('T')[0];
            renderizarTabela();
        };

        // ==========================================
        // NAVEGAÇÃO COM TECLA ENTER
        // ==========================================
        document.addEventListener('keydown', function(event) {
            // Verifica se o modal de lançamento está aberto e se a tecla apertada foi o Enter
            if (event.key === 'Enter' && document.getElementById('modalLancamento').style.display === 'block') {
                event.preventDefault(); // Evita recarregar a página
                
                // Pega todos os campos que têm a classe 'campo-nav' e não estão escondidos
                const focusableElements = Array.from(document.querySelectorAll('.campo-nav'));
                const index = focusableElements.indexOf(document.activeElement);
                
                if (index > -1 && index < focusableElements.length - 1) {
                    focusableElements[index + 1].focus(); // Pula para o próximo
                } else if (index === focusableElements.length - 1) {
                    salvarLancamento(); // Se for o último (o botão Confirmar), ele salva
                }
            }
        });

        async function carregarProdutos() {
            try {
                const response = await fetch(URL_DADOS);
                const text = await response.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                listaProdutos = json.table.rows.map(row => ({
                    codigo: row.c[0] ? row.c[0].v.toString() : '',
                    nome: row.c[1] ? row.c[1].v : '',
                    preco: row.c[2] ? parseFloat(row.c[2].v) : 0
                }));
            } catch (e) { console.error(e); }
        }

        function fecharModal(id) { document.getElementById(id).style.display = "none"; }

        function abrirModal(indexEdit = null) {
            document.getElementById('modalLancamento').style.display = "block";
            const form = document.getElementById('formLancamento');
            
            if (indexEdit !== null) {
                document.getElementById('tituloModalLancamento').innerText = "Editar Lançamento";
                document.getElementById('editIndex').value = indexEdit;
                const item = lancamentos[indexEdit];
                document.getElementById('dataLancamento').value = item.dataRAW;
                document.getElementById('codFornecedor').value = item.codFornecedor;
                document.getElementById('nomeFornecedor').innerText = item.nomeFornecedor;
                document.getElementById('codProduto').value = item.codProduto;
                document.getElementById('nomeProduto').innerText = item.nomeProduto;
                document.getElementById('precoVenda').value = item.venda;
                document.getElementById('precoCusto').value = item.custo;
                document.getElementById('gastos').value = item.gastos;
                calcularLucro();
            } else {
                document.getElementById('tituloModalLancamento').innerText = "Lançar Item";
                document.getElementById('editIndex').value = "";
                if(!document.getElementById('manterDados').checked) {
                    form.reset();
                    document.getElementById('dataLancamento').value = document.getElementById('filtroData').value;
                }
                limparCamposProduto();
                
                // Dá foco automático na data se for limpar tudo, ou no produto se mantiver o cabeçalho
                if(document.getElementById('codFornecedor').value !== "") {
                    document.getElementById('codProduto').focus();
                } else {
                    document.getElementById('dataLancamento').focus();
                }
            }
        }

        function buscarProduto() {
            const cod = document.getElementById('codProduto').value;
            const p = listaProdutos.find(item => item.codigo === cod);
            if (p) {
                document.getElementById('nomeProduto').innerText = p.nome;
                // Preenche o valor de venda, mas permite que o usuário edite depois
                document.getElementById('precoVenda').value = p.preco; 
                calcularLucro();
            } else {
                document.getElementById('nomeProduto').innerText = "Produto não encontrado";
                document.getElementById('precoVenda').value = "";
            }
        }

        function calcularLucro() {
            const venda = parseFloat(document.getElementById('precoVenda').value) || 0;
            const custo = parseFloat(document.getElementById('precoCusto').value) || 0;
            const gastos = parseFloat(document.getElementById('gastos').value) || 0;
            const lucro = venda - custo - gastos;
            document.getElementById('valorLucro').innerText = lucro.toFixed(2);
            document.getElementById('boxLucro').classList.toggle('lucro-negativo', lucro < 0);
        }

        function salvarLancamento() {
            const data = document.getElementById('dataLancamento').value;
            const produtoNome = document.getElementById('nomeProduto').innerText;
            if (!data || produtoNome === "Produto não encontrado" || produtoNome === "") {
                alert("Preencha os dados do produto corretamente."); return;
            }

            const novo = {
                dataRAW: data,
                dataBR: data.split('-').reverse().join('/'),
                codFornecedor: document.getElementById('codFornecedor').value,
                nomeFornecedor: document.getElementById('nomeFornecedor').innerText,
                codProduto: document.getElementById('codProduto').value,
                nomeProduto: produtoNome,
                custo: parseFloat(document.getElementById('precoCusto').value || 0),
                venda: parseFloat(document.getElementById('precoVenda').value || 0), // Pega o valor que estiver no campo (da planilha ou digitado)
                gastos: parseFloat(document.getElementById('gastos').value || 0),
                lucro: parseFloat(document.getElementById('valorLucro').innerText)
            };

            const editIndex = document.getElementById('editIndex').value;
            if (editIndex !== "") lancamentos[editIndex] = novo;
            else lancamentos.unshift(novo);

            localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
            renderizarTabela();

            if (document.getElementById('manterDados').checked && editIndex === "") {
                limparCamposProduto();
                document.getElementById('codProduto').focus();
            } else {
                fecharModal('modalLancamento');
            }
        }

        function limparCamposProduto() {
            document.getElementById('codProduto').value = "";
            document.getElementById('nomeProduto').innerText = "";
            document.getElementById('precoVenda').value = "";
            document.getElementById('precoCusto').value = "";
            document.getElementById('gastos').value = "0";
            document.getElementById('valorLucro').innerText = "0.00";
            document.getElementById('boxLucro').classList.remove('lucro-negativo');
        }

        // ==========================================
        // RENDERIZAR TABELA E SELEÇÃO
        // ==========================================
        function renderizarTabela() {
            const tbody = document.getElementById('listaItens');
            tbody.innerHTML = "";
            const filtro = document.getElementById('filtroData').value;
            
            // Desmarca o botão "Selecionar Todos" ao atualizar a tabela
            document.getElementById('chkTodos').checked = false;

            lancamentos.forEach((item, index) => {
                if (item.dataRAW === filtro) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="chk-col">
                            <input type="checkbox" class="chk-item" value="${index}">
                        </td>
                        <td>${item.dataBR}</td><td>${item.nomeFornecedor}</td><td>${item.nomeProduto}</td>
                        <td>R$ ${item.custo.toFixed(2)}</td><td>R$ ${item.venda.toFixed(2)}</td><td>R$ ${item.gastos.toFixed(2)}</td>
                        <td style="color:${item.lucro >= 0 ? '#34a853' : '#ea4335'}; font-weight:bold;">R$ ${item.lucro.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="abrirModal(${index})">✎</button>
                            <button class="btn-acao btn-excluir" onclick="excluirLancamento(${index})">✖</button>
                        </td>`;
                    tbody.appendChild(tr);
                }
            });
        }

        function selecionarTodos() {
            const marcar = document.getElementById('chkTodos').checked;
            const caixas = document.querySelectorAll('.chk-item');
            caixas.forEach(caixa => caixa.checked = marcar);
        }

        function excluirLancamento(i) {
            if(confirm("Excluir item?")) { lancamentos.splice(i, 1); localStorage.setItem('lancamentos', JSON.stringify(lancamentos)); renderizarTabela(); }
        }

        function abrirModalFornecedor() { document.getElementById('modalFornecedores').style.display = "block"; renderizarListaFornecedores(); }
        
        function buscarFornecedor() {
            const f = fornecedoresCadastrados.find(f => f.id === document.getElementById('codFornecedor').value);
            document.getElementById('nomeFornecedor').innerText = f ? f.nome : "Não cadastrado";
        }

        function salvarNovoFornecedor() {
            const id = document.getElementById('novoCadCodigo').value;
            const nome = document.getElementById('novoCadNome').value;
            if(!id || !nome) return;
            fornecedoresCadastrados.push({ id, nome });
            localStorage.setItem('fornecedores', JSON.stringify(fornecedoresCadastrados));
            renderizarListaFornecedores();
        }

        function renderizarListaFornecedores() {
            const div = document.getElementById('listaFornecedoresModal');
            div.innerHTML = fornecedoresCadastrados.map((f, i) => `
                <div class="item-fornecedor"><span><b>${f.id}</b> - ${f.nome}</span>
                <button onclick="excluirFornecedor(${i})">Excluir</button></div>`).join('');
        }

        function excluirFornecedor(i) {
            fornecedoresCadastrados.splice(i, 1);
            localStorage.setItem('fornecedores', JSON.stringify(fornecedoresCadastrados));
            renderizarListaFornecedores();
        }

        // ==========================================
        // IMPRIMIR APENAS ITENS SELECIONADOS
        // ==========================================
        function imprimirSelecionados() {
            // Busca apenas os checkboxes que estão marcados
            const marcados = document.querySelectorAll('.chk-item:checked');
            
            if(marcados.length === 0) {
                alert("Selecione pelo menos um lançamento na tabela para imprimir.");
                return;
            }

            // Mapeia os índices dos itens selecionados para a lista de objetos 'lancamentos'
            const itensParaImprimir = Array.from(marcados).map(checkbox => lancamentos[checkbox.value]);
            
            let t = `<table border="1" style="width:100%; border-collapse:collapse; text-align: left; font-family: sans-serif;">
                <thead>
                    <tr style="background-color: #eee;">
                        <th style="padding: 8px;">Data</th>
                        <th style="padding: 8px;">Fornecedor</th>
                        <th style="padding: 8px;">Produto</th>
                        <th style="padding: 8px;">Custo</th>
                        <th style="padding: 8px;">Venda</th>
                        <th style="padding: 8px;">Lucro</th>
                    </tr>
                </thead>
                <tbody>`;
                
            let total = 0;
            itensParaImprimir.forEach(it => {
                total += it.lucro;
                t += `<tr>
                        <td style="padding: 8px;">${it.dataBR}</td>
                        <td style="padding: 8px;">${it.nomeFornecedor}</td>
                        <td style="padding: 8px;">${it.nomeProduto}</td>
                        <td style="padding: 8px;">R$ ${it.custo.toFixed(2)}</td>
                        <td style="padding: 8px;">R$ ${it.venda.toFixed(2)}</td>
                        <td style="padding: 8px;">R$ ${it.lucro.toFixed(2)}</td>
                      </tr>`;
            });
            t += `</tbody></table><h3 style="font-family: sans-serif; text-align: right;">Lucro dos Itens Selecionados: R$ ${total.toFixed(2)}</h3>`;
            
            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`<html><body style="padding: 20px;"><h2 style="font-family: sans-serif; text-align: center;">Relatório de Lançamentos</h2>${t}</body></html>`);
            win.document.close();
            
            // Pequeno delay para garantir que o navegador monte a tela antes de abrir a janela de impressão
            setTimeout(() => {
                win.print();
                win.close();
            }, 300);
        }
    </script>
</body>
</html>
