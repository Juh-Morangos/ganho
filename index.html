<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Lançamentos - Integrado</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #1a73e8; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        main { max-width: 1100px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        
        .btn-novo { background-color: #34a853; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-novo:hover { background-color: #2d8e47; }
        .btn-salvar { background-color: #1a73e8; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; border-radius: 6px; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #fcfcfc; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 12px; position: relative; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #3c4043; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; }
        .form-group input[readonly] { background-color: #f1f3f4; outline: none; }
        
        .info-busca { display: block; font-size: 13px; color: #1a73e8; margin-top: 4px; min-height: 18px; font-weight: 500; }
        
        .resultado-lucro { background-color: #e6f4ea; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 5px solid #34a853; font-size: 18px; }
        .lucro-negativo { background-color: #fce8e6; border-left-color: #ea4335; }
    </style>
</head>
<body>

    <header>
        <h1>Sistema de Lançamentos</h1>
    </header>

    <main>
        <div class="controles">
            <div>
