<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Lançamentos - Integrado</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #1a73e8; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        main { max-width: 1100px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        
        .btn-novo { background-color: #34a853; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-novo:hover { background-color: #2d8e47; }
        .btn-salvar { background-color: #1a73e8; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; border-radius: 6px; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #fcfcfc; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 12px; position: relative; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #3c4043; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; }
        .form-group input[readonly] { background-color: #f1f3f4; outline: none; }
        
        .info-busca { display: block; font-size: 13px; color: #1a73e8; margin-top: 4px; min-height: 18px; font-weight: 500; }
        
        .resultado-lucro { background-color: #e6f4ea; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 5px solid #34a853; font-size: 18px; }
        .lucro-negativo { background-color: #fce8e6; border-left-color: #ea4335; }
    </style>
</head>
<body>

    <header>
        <h1>Sistema de Lançamentos</h1>
    </header>

    <main>
        <div class="controles">
            <div>
                <label for="filtroData"><strong>Data de Consulta:</strong></label>
                <input type="date" id="filtroData">
            </div>
            <button class="btn-novo" onclick="abrirModal()">+ Novo Lançamento</button>
        </div>

        <table id="tabelaLancamentos">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Fornecedor</th>
                    <th>Produto</th>
                    <th>Custo</th>
                    <th>Venda</th>
                    <th>Gastos</th>
                    <th>Lucro</th>
                </tr>
            </thead>
            <tbody id="listaItens">
                </tbody>
        </table>
    </main>

    <div id="modalLancamento" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2 style="margin-top: 0;">Lançar Item</h2>
            
            <form id="formLancamento">
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="dataLancamento" required>
                </div>

                <div class="form-group">
                    <label>Cód. Fornecedor:</label>
                    <input type="text" id="codFornecedor" placeholder="Ex: 1" onblur="buscarFornecedor()">
                    <span class="info-busca" id="nomeFornecedor"></span>
                </div>

                <div class="form-group">
                    <label>Cód. Produto (Planilha):</label>
                    <input type="text" id="codProduto" placeholder="Digite o código" onblur="buscarProduto()">
                    <span class="info-busca" id="nomeProduto"></span>
                </div>

                <div class="form-group">
                    <label>Preço Venda (Coluna E):</label>
                    <input type="number" id="precoVenda" readonly>
                </div>

                <div class="form-group">
                    <label>Preço de Custo (R$):</label>
                    <input type="number" id="precoCusto" step="0.01" oninput="calcularLucro()">
                </div>

                <div class="form-group">
                    <label>Gastos Extras (R$):</label>
                    <input type="number" id="gastos" step="0.01" value="0" oninput="calcularLucro()">
                </div>

                <div id="boxLucro" class="resultado-lucro">
                    Lucro: <strong>R$ <span id="valorLucro">0.00</span></strong>
                </div>

                <button type="button" class="btn-salvar" onclick="salvarLancamento()">Confirmar Lançamento</button>
            </form>
        </div>
    </div>

    <script>
        // ID da sua planilha extraído do link fornecido
        const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
        // URL da API buscando Colunas A (Código), B (Produto) e E (Preço)
        const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;

        let listaProdutos = [];

        // Mock de fornecedores (Pode ser outra planilha no futuro)
        const fornecedoresCadastrados = [
            { id: "1", nome: "Fornecedor Exemplo A" },
            { id: "2", nome: "Fornecedor Exemplo B" }
        ];

        async function carregarProdutos() {
            try {
                const response = await fetch(URL_DADOS);
                const text = await response.text();
                // Limpeza do retorno JSONP do Google
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                
                listaProdutos = json.table.rows.map(row => ({
                    codigo: row.c[0] ? row.c[0].v.toString() : '',
                    nome: row.c[1] ? row.c[1].v : '',
                    preco: row.c[2] ? parseFloat(row.c[2].v) : 0
                }));
                console.log("Produtos carregados:", listaProdutos.length);
            } catch (e) {
                console.error("Erro ao carregar planilha:", e);
                alert("Erro ao carregar dados da planilha. Verifique se ela está compartilhada como 'Qualquer pessoa com o link'.");
            }
        }

        window.onload = () => {
            carregarProdutos();
            document.getElementById('filtroData').value = new Date().toISOString().split('T')[0];
        };

        function abrirModal() {
            document.getElementById('modalLancamento').style.display = "block";
            document.getElementById('dataLancamento').value = new Date().toISOString().split('T')[0];
        }

        function fecharModal() {
            document.getElementById('modalLancamento').style.display = "none";
            document.getElementById('formLancamento').reset();
            document.getElementById('nomeFornecedor').innerText = "";
            document.getElementById('nomeProduto').innerText = "";
        }

        function buscarFornecedor() {
            const cod = document.getElementById('codFornecedor').value;
            const f = fornecedoresCadastrados.find(item => item.id === cod);
            document.getElementById('nomeFornecedor').innerText = f ? f.nome : "Não cadastrado";
        }

        function buscarProduto() {
            const cod = document.getElementById('codProduto').value;
            const p = listaProdutos.find(item => item.codigo === cod);
            if (p) {
                document.getElementById('nomeProduto').innerText = p.nome;
                document.getElementById('precoVenda').value = p.preco;
                calcularLucro();
            } else {
                document.getElementById('nomeProduto').innerText = "Produto não encontrado";
                document.getElementById('precoVenda').value = "";
            }
        }

        function calcularLucro() {
            const venda = parseFloat(document.getElementById('precoVenda').value) || 0;
            const custo = parseFloat(document.getElementById('precoCusto').value) || 0;
            const gastos = parseFloat(document.getElementById('gastos').value) || 0;
            const lucro = venda - custo - gastos;
            
            const spanLucro = document.getElementById('valorLucro');
            const boxLucro = document.getElementById('boxLucro');
            
            spanLucro.innerText = lucro.toFixed(2);
            
            if(lucro < 0) {
                boxLucro.classList.add('lucro-negativo');
            } else {
                boxLucro.classList.remove('lucro-negativo');
            }
        }

        function salvarLancamento() {
            const data = document.getElementById('dataLancamento').value;
            const produto = document.getElementById('nomeProduto').innerText;
            const lucro = document.getElementById('valorLucro').innerText;

            if (!data || produto === "Produto não encontrado" || produto === "") {
                alert("Verifique os campos obrigatórios.");
                return;
            }

            const tbody = document.getElementById('listaItens');
            const row = tbody.insertRow(0); // Adiciona no topo da lista
            
            row.innerHTML = `
                <td>${data.split('-').reverse().join('/')}</td>
                <td>${document.getElementById('nomeFornecedor').innerText}</td>
                <td>${produto}</td>
                <td>R$ ${parseFloat(document.getElementById('precoCusto').value || 0).toFixed(2)}</td>
                <td>R$ ${parseFloat(document.getElementById('precoVenda').value || 0).toFixed(2)}</td>
                <td>R$ ${parseFloat(document.getElementById('gastos').value || 0).toFixed(2)}</td>
                <td style="color: ${lucro >= 0 ? '#34a853' : '#ea4335'}; font-weight: bold;">R$ ${lucro}</td>
            `;

            fecharModal();
        }
    </script>
</body>
</html>
