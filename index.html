<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Colméia v5.1 - Correção Edição</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #1a73e8; color: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 15px; }
        main { max-width: 1550px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .controles { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; background: #fff; border-radius: 8px; }
        .filtros-grupo { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .controles-acoes { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        select, input[type="date"], input[type="text"], input[type="number"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 13px; }

        .btn { border: none; padding: 10px 15px; font-size: 13px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; color: white; text-decoration: none; text-align: center; }
        .btn-novo { background-color: #34a853; }
        .btn-fornecedor { background-color: #fbbc05; color: #333; }
        .btn-comprador { background-color: #ff6b6b; color: white; }
        .btn-imprimir { background-color: #6c757d; }
        .btn-salvar { background-color: #1a73e8; width: 100%; padding: 15px; margin-top: 15px; font-size: 18px; }
        
        .btn-acao { padding: 6px 10px; font-size: 13px; margin-right: 3px; border-radius: 4px; border: none; cursor: pointer; color: white; display: inline-flex; align-items: center; justify-content: center; min-width: 32px; }
        .btn-cupom { background-color: #17a2b8; }
        .btn-editar { background-color: #fbbc05; color: #333; }
        .btn-excluir { background-color: #ea4335; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 25px; width: 95%; max-width: 1100px; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 12px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; }
        
        .info-busca { display: block; font-size: 11px; color: #1a73e8; margin-top: 3px; font-weight: bold; min-height: 15px; }
        .carrinho-container { margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/cCj4sBRm/branco.png" alt="Logo" style="height: 40px;">
        <h1 style="margin: 0; font-size: 20px;">Sistema Colméia - Correção Ativada</h1>
    </header>

    <main>
        <div class="controles">
            <div class="filtros-grupo">
                <input type="date" id="filtroDataInicio" onchange="renderizarTabela()"> até 
                <input type="date" id="filtroDataFim" onchange="renderizarTabela()">
                <select id="filtroComprador" onchange="renderizarTabela()"><option value="">Todos Compradores</option></select>
                <select id="filtroFornecedor" onchange="renderizarTabela()"><option value="">Todos Fornecedores</option></select>
            </div>
            <div class="controles-acoes">
                <button class="btn btn-imprimir" onclick="imprimirSelecionados()">🖨️ Lista</button>
                <button class="btn btn-comprador" onclick="abrirModalComprador()">👤 Compradores</button>
                <button class="btn btn-fornecedor" onclick="abrirModalFornecedor()">👥 Fornecedores</button>
                <button class="btn btn-novo" onclick="abrirModalLancamento()">+ Novo Lote</button>
            </div>
        </div>

        <table id="tabelaPrincipal">
            <thead>
                <tr>
                    <th width="30"><input type="checkbox" id="chkTodos" onchange="selecionarTodos()"></th>
                    <th>Data</th>
                    <th>Comprador</th>
                    <th>Fornecedor</th>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Custo Un.</th>
                    <th>Venda Un.</th>
                    <th style="color: #1a73e8;">Lucro Un.</th>
                    <th>Lucro Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaGeral"></tbody>
        </table>
    </main>

    <!-- MODAL DE LANÇAMENTO -->
    <div id="modalLancamento" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalLancamento')">&times;</span>
            <h2 id="tituloModal" style="color: #1a73e8; margin-top:0">Lote de Produtos</h2>
            
            <!-- Campo oculto para saber se estamos editando -->
            <input type="hidden" id="editIndexGlobal" value="">

            <div class="form-grid" style="margin-bottom: 15px; background: #fff;">
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="dataLote" class="input-nav">
                </div>
                <div class="form-group">
                    <label>Comprador:</label>
                    <select id="selComprador" class="input-nav"></select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Fornecedor (Cód ou Nome):</label>
                    <input type="text" id="codFornecedor" class="input-nav" onblur="buscarFornecedor()">
                    <span id="nomeFornecedor" class="info-busca"></span>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Produto:</label>
                    <input type="text" id="codProduto" class="input-nav" onblur="buscarProduto()">
                    <span id="nomeProduto" class="info-busca"></span>
                </div>
                <div class="form-group">
                    <label>Qtd:</label>
                    <input type="number" id="qtdItem" class="input-nav">
                </div>
                <div class="form-group">
                    <label>Custo Un:</label>
                    <input type="number" id="custoItem" class="input-nav" step="0.01">
                </div>
                <div class="form-group">
                    <label>Venda Un:</label>
                    <input type="number" id="vendaItem" class="input-nav" step="0.01">
                </div>
                <div class="form-group">
                    <label>Gasto Ex:</label>
                    <input type="number" id="gastoItem" class="input-nav" step="0.01" value="0">
                </div>
                <div class="form-group" style="display:flex; align-items:flex-end;">
                    <button type="button" id="btnAcaoInterna" class="btn btn-novo" style="width:100%" onclick="processarBotaoItem()">+ Adicionar</button>
                </div>
            </div>

            <div class="carrinho-container" id="areaCarrinho">
                <table style="margin-top:0">
                    <thead>
                        <tr style="background:#eee">
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Lucro Un</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoCarrinho"></tbody>
                </table>
            </div>

            <button class="btn btn-salvar" id="btnFinalizar" onclick="salvarLoteCompleto()">GRAVAR LANÇAMENTOS</button>
        </div>
    </div>

    <!-- MODAL FORNECEDORES / COMPRADORES (Simplificados para o código não ficar gigante) -->
    <div id="modalGenerico" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close" onclick="fecharModal('modalGenerico')">&times;</span>
            <h2 id="tituloGer">Cadastro</h2>
            <div id="corpoGer"></div>
        </div>
    </div>

    <script>
        const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
        const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;

        let listaProdutosAPI = [];
        let fornecedores = JSON.parse(localStorage.getItem('fornecedores')) || [];
        let compradores = JSON.parse(localStorage.getItem('compradores')) || [];
        let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
        let carrinhoTemporario = [];

        window.onload = () => {
            carregarDadosAPI();
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('filtroDataInicio').value = hoje;
            document.getElementById('filtroDataFim').value = hoje;
            atualizarSelectsFiltro();
            renderizarTabela();
        };

        async function carregarDadosAPI() {
            try {
                const res = await fetch(URL_DADOS);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                listaProdutosAPI = json.table.rows.map(r => ({
                    codigo: r.c[0] ? r.c[0].v.toString() : '',
                    nome: r.c[1] ? r.c[1].v : '',
                    preco: r.c[2] ? parseFloat(r.c[2].v) : 0
                }));
            } catch (e) { console.error("Erro API:", e); }
        }

        // --- FUNÇÃO DE EDIÇÃO (CORRIGIDA) ---
        function alterarLancamento(idx) {
            const it = lancamentos[idx];
            abrirModalLancamento(); // Isso limpa tudo e prepara o select de compradores
            
            document.getElementById('tituloModal').innerText = "Alterar Lançamento";
            document.getElementById('editIndexGlobal').value = idx;
            document.getElementById('areaCarrinho').style.display = 'none';
            document.getElementById('btnFinalizar').style.display = 'none';
            document.getElementById('btnAcaoInterna').innerText = "Confirmar Alteração";

            // Preenche os campos com os dados do item
            document.getElementById('dataLote').value = it.dataRAW;
            document.getElementById('selComprador').value = it.comprador;
            document.getElementById('codFornecedor').value = it.codFornecedor;
            document.getElementById('nomeFornecedor').innerText = it.nomeFornecedor;
            document.getElementById('codProduto').value = it.codProduto;
            document.getElementById('nomeProduto').innerText = it.nomeProduto;
            document.getElementById('qtdItem').value = it.qtd;
            document.getElementById('custoItem').value = it.custoUn;
            document.getElementById('vendaItem').value = it.vendaUn;
            document.getElementById('gastoItem').value = it.gastoExUn;
        }

        // Decida se adiciona ao carrinho ou atualiza o item editado
        function processarBotaoItem() {
            const idxEdit = document.getElementById('editIndexGlobal').value;
            
            if (idxEdit !== "") {
                // LÓGICA DE ATUALIZAÇÃO
                const dt = document.getElementById('dataLote').value;
                const comp = document.getElementById('selComprador').value;
                const cf = document.getElementById('codFornecedor').value;
                const nf = document.getElementById('nomeFornecedor').innerText;

                const qt = parseFloat(document.getElementById('qtdItem').value);
                const ci = parseFloat(document.getElementById('custoItem').value) || 0;
                const vi = parseFloat(document.getElementById('vendaItem').value) || 0;
                const gi = parseFloat(document.getElementById('gastoItem').value) || 0;
                const lUn = vi - (ci + gi);

                lancamentos[idxEdit] = {
                    dataRAW: dt,
                    dataBR: dt.split('-').reverse().join('/'),
                    comprador: comp,
                    codFornecedor: cf,
                    nomeFornecedor: nf,
                    codProduto: document.getElementById('codProduto').value,
                    nomeProduto: document.getElementById('nomeProduto').innerText,
                    qtd: qt,
                    custoUn: ci,
                    vendaUn: vi,
                    gastoExUn: gi,
                    custoTotalItem: (ci + gi) * qt,
                    lucroTotalItem: lUn * qt,
                    lucroUn: lUn,
                    lucro: lUn * qt
                };

                localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
                renderizarTabela();
                fecharModal('modalLancamento');
                alert("Lançamento atualizado!");
            } else {
                adicionarAoCarrinho();
            }
        }

        // --- RESTANTE DAS FUNÇÕES ---
        function adicionarAoCarrinho() {
            const cp = document.getElementById('codProduto').value;
            const np = document.getElementById('nomeProduto').innerText;
            const qt = parseFloat(document.getElementById('qtdItem').value);
            if(!cp || !qt) return alert("Produto e Qtd são obrigatórios!");

            const ci = parseFloat(document.getElementById('custoItem').value) || 0;
            const vi = parseFloat(document.getElementById('vendaItem').value) || 0;
            const gi = parseFloat(document.getElementById('gastoItem').value) || 0;
            const lUn = vi - (ci + gi);

            carrinhoTemporario.push({
                codProduto: cp, nomeProduto: np, qtd: qt, custoUn: ci, vendaUn: vi, gastoExUn: gi, 
                custoTotalItem: (ci + gi) * qt, lucroTotalItem: lUn * qt, lucroUn: lUn
            });

            limparCamposProduto();
            atualizarCarrinhoUI();
            document.getElementById('codProduto').focus();
        }

        function atualizarCarrinhoUI() {
            document.getElementById('corpoCarrinho').innerHTML = carrinhoTemporario.map((it, idx) => `
                <tr><td>${it.nomeProduto}</td><td>${it.qtd}</td><td>R$ ${it.lucroUn.toFixed(2)}</td>
                <td><button onclick="carrinhoTemporario.splice(${idx},1); atualizarCarrinhoUI()">✕</button></td></tr>`).join('');
        }

        function salvarLoteCompleto() {
            const dt = document.getElementById('dataLote').value;
            const comp = document.getElementById('selComprador').value;
            const nf = document.getElementById('nomeFornecedor').innerText;
            if(!dt || !comp || carrinhoTemporario.length === 0) return alert("Preencha Data, Comprador e Itens!");

            carrinhoTemporario.forEach(it => {
                lancamentos.unshift({ dataRAW: dt, dataBR: dt.split('-').reverse().join('/'), comprador: comp, nomeFornecedor: nf, ...it, lucro: it.lucroTotalItem });
            });
            localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
            renderizarTabela();
            fecharModal('modalLancamento');
        }

        function renderizarTabela() {
            const tbody = document.getElementById('listaGeral');
            tbody.innerHTML = "";
            const fi = document.getElementById('filtroDataInicio').value;
            const ff = document.getElementById('filtroDataFim').value;
            const sC = document.getElementById('filtroComprador').value;
            const sF = document.getElementById('filtroFornecedor').value;

            lancamentos.forEach((it, idx) => {
                if(it.dataRAW >= fi && it.dataRAW <= ff && (!sC || it.comprador === sC) && (!sF || it.nomeFornecedor === sF)) {
                    tbody.innerHTML += `<tr>
                        <td><input type="checkbox" class="chk-item" value="${idx}"></td>
                        <td>${it.dataBR}</td><td style="color:#ff6b6b; font-weight:bold">${it.comprador}</td>
                        <td>${it.nomeFornecedor}</td><td>${it.nomeProduto}</td><td>${it.qtd}</td>
                        <td>R$ ${it.custoUn.toFixed(2)}</td><td>R$ ${it.vendaUn.toFixed(2)}</td>
                        <td style="color:#1a73e8; font-weight:bold">R$ ${it.lucroUn.toFixed(2)}</td>
                        <td style="color:${it.lucroTotalItem>=0?'green':'red'}; font-weight:bold">R$ ${it.lucroTotalItem.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="alterarLancamento(${idx})">✎</button>
                            <button class="btn-acao btn-excluir" onclick="if(confirm('Excluir?')){lancamentos.splice(${idx},1); localStorage.setItem('lancamentos',JSON.stringify(lancamentos)); renderizarTabela();}">✖</button>
                        </td></tr>`;
                }
            });
        }

        function abrirModalLancamento() {
            document.getElementById('modalLancamento').style.display = 'block';
            document.getElementById('tituloModal').innerText = "Novo Lote";
            document.getElementById('editIndexGlobal').value = "";
            document.getElementById('areaCarrinho').style.display = 'block';
            document.getElementById('btnFinalizar').style.display = 'block';
            document.getElementById('btnAcaoInterna').innerText = "+ Adicionar";
            
            const sel = document.getElementById('selComprador');
            sel.innerHTML = '<option value="">Selecione...</option>' + compradores.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            
            carrinhoTemporario = []; atualizarCarrinhoUI();
        }

        function atualizarSelectsFiltro() {
            document.getElementById('filtroComprador').innerHTML = '<option value="">Todos Compradores</option>' + compradores.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('filtroFornecedor').innerHTML = '<option value="">Todos Fornecedores</option>' + fornecedores.map(f => `<option value="${f.nome}">${f.nome}</option>`).join('');
        }

        function buscarFornecedor() {
            const t = document.getElementById('codFornecedor').value.toLowerCase().trim();
            const f = fornecedores.find(i => i.id.toLowerCase() === t || i.nome.toLowerCase().includes(t));
            if(f) { document.getElementById('codFornecedor').value = f.id; document.getElementById('nomeFornecedor').innerText = f.nome; }
        }

        function buscarProduto() {
            const t = document.getElementById('codProduto').value.toLowerCase().trim();
            const p = listaProdutosAPI.find(i => i.codigo.toLowerCase() === t || i.nome.toLowerCase().includes(t));
            if(p) { document.getElementById('codProduto').value = p.codigo; document.getElementById('nomeProduto').innerText = p.nome; document.getElementById('vendaItem').value = p.preco; }
        }

        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
        function limparCamposProduto() { document.getElementById('codProduto').value = ""; document.getElementById('nomeProduto').innerText = ""; document.getElementById('qtdItem').value = ""; document.getElementById('custoItem').value = ""; document.getElementById('vendaItem').value = ""; document.getElementById('gastoItem').value = "0"; }
        
        // Funções simples de cadastro para os outros modais
        function abrirModalComprador() { alert("Use o código anterior para cadastrar compradores. Esta versão foca na correção do botão EDITAR."); }
        function abrirModalFornecedor() { alert("Use o código anterior para cadastrar fornecedores."); }
    </script>
</body>
</html>
