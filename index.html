<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COLMÉIA - LANÇAMENTO POR LOTE</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        
        header { background-color: #1a73e8; color: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 15px; }
        
        main { max-width: 1400px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        
        .controles { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        .controles-acoes { display: flex; gap: 10px; align-items: center; }
        
        .btn { border: none; padding: 10px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; color: white; text-decoration: none; text-align: center; }
        .btn-novo { background-color: #34a853; }
        .btn-novo:hover { background-color: #2d8e47; }
        .btn-fornecedor { background-color: #fbbc05; color: #333; }
        .btn-imprimir { background-color: #6c757d; }
        .btn-salvar { background-color: #1a73e8; width: 100%; padding: 15px; margin-top: 15px; font-size: 18px; }
        .btn-dashboard { background-color: #8e44ad; }
        
        .btn-acao { padding: 5px 10px; font-size: 13px; margin-right: 2px; border-radius: 4px; border: none; cursor: pointer; color: white;}
        .btn-editar { background-color: #fbbc05; color: #333;}
        .btn-excluir { background-color: #ea4335; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 11px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 25px; width: 95%; max-width: 1000px; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .full-width { grid-column: 1 / -1; }
        
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #3c4043; font-size: 13px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; }
        
        .info-busca { display: block; font-size: 12px; color: #1a73e8; margin-top: 4px; min-height: 16px; font-weight: bold; }
        
        .resultado-lucro { background-color: #e6f4ea; padding: 15px; border-radius: 8px; border-left: 5px solid #34a853; text-align: center; margin-top: 10px; }
        .carrinho-container { margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; max-height: 300px; overflow-y: auto; }
        
        .badge-total { font-size: 18px; font-weight: bold; color: #1a73e8; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/cCj4sBRm/branco.png" alt="Logo" style="height: 45px;">
        <h1 style="margin: 0; font-size: 22px;">Lançamentos por Lote</h1>
    </header>

    <main>
        <div class="controles">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label><strong>Período:</strong></label>
                <input type="date" id="filtroDataInicio" onchange="renderizarTabela()">
                <span>até</span>
                <input type="date" id="filtroDataFim" onchange="renderizarTabela()">
            </div>

            <div class="controles-acoes">
                <a href="dashboard.html" class="btn btn-dashboard">📊 Dashboard</a>
                <button class="btn btn-imprimir" onclick="imprimirSelecionados()">🖨️ Imprimir</button>
                <button class="btn btn-fornecedor" onclick="abrirModalFornecedor()">👥 Fornecedores</button>
                <button class="btn btn-novo" onclick="abrirModalLancamento()">+ Iniciar Novo Lote</button>
            </div>
        </div>

        <table id="tabelaPrincipal">
            <thead>
                <tr>
                    <th width="30"><input type="checkbox" id="chkTodos" onchange="selecionarTodos()"></th>
                    <th>Data</th>
                    <th>Fornecedor</th>
                    <th>Produto</th>
                    <th style="text-align:center">Qtd</th>
                    <th>Custo Un.</th>
                    <th>Venda Un.</th>
                    <th>Gasto Ex.</th>
                    <th>Custo Total</th>
                    <th>Lucro Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaGeral"></tbody>
        </table>
    </main>

    <!-- MODAL DE LANÇAMENTO (ESTILO CARRINHO) -->
    <div id="modalLancamento" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalLancamento')">&times;</span>
            <h2 style="color: #1a73e8; margin-bottom: 10px;">Novo Lote de Produtos</h2>
            
            <!-- CABEÇALHO DO LOTE -->
            <div class="form-grid" style="margin-bottom: 20px; background: #fff;">
                <div class="form-group">
                    <label>Data do Lote:</label>
                    <input type="date" id="dataLote" class="campo-lote">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Fornecedor (Cód ou Nome):</label>
                    <input type="text" id="codFornecedor" class="campo-lote" placeholder="Aperte Enter para buscar" onblur="buscarFornecedor()">
                    <span id="nomeFornecedor" class="info-busca"></span>
                </div>
            </div>

            <!-- ADICIONAR PRODUTO -->
            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Produto (Cód ou Nome):</label>
                    <input type="text" id="codProduto" class="campo-item" placeholder="Buscar produto..." onblur="buscarProduto()">
                    <span id="nomeProduto" class="info-busca"></span>
                </div>
                <div class="form-group">
                    <label>Quantidade:</label>
                    <input type="number" id="qtdItem" class="campo-item" min="1">
                </div>
                <div class="form-group">
                    <label>Preço Custo Un (R$):</label>
                    <input type="number" id="custoItem" class="campo-item" step="0.01">
                </div>
                <div class="form-group">
                    <label>Preço Venda Un (R$):</label>
                    <input type="number" id="vendaItem" class="campo-item" step="0.01">
                </div>
                <div class="form-group">
                    <label>Gasto Extra Un (R$):</label>
                    <input type="number" id="gastoItem" class="campo-item" step="0.01" value="0">
                </div>
                <div class="form-group" style="display:flex; align-items:flex-end;">
                    <button type="button" class="btn btn-novo" style="width:100%" onclick="adicionarAoCarrinho()">+ Adicionar</button>
                </div>
            </div>

            <!-- TABELA TEMPORÁRIA (CARRINHO) -->
            <div class="carrinho-container">
                <table>
                    <thead>
                        <tr style="background:#eee">
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Custo Un</th>
                            <th>Venda Un</th>
                            <th>Lucro Un</th>
                            <th>Lucro Total</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoCarrinho"></tbody>
                </table>
            </div>

            <!-- RESUMO DO LOTE -->
            <div class="resultado-lucro" style="display: flex; justify-content: space-around; align-items: center;">
                <div>CUSTO TOTAL DO LOTE: <br><span id="resumoCustoLote" class="badge-total">R$ 0.00</span></div>
                <div>LUCRO TOTAL ESTIMADO: <br><span id="resumoLucroLote" class="badge-total" style="color:#2d8e47">R$ 0.00</span></div>
            </div>

            <button class="btn btn-salvar" onclick="salvarLoteCompleto()">FINALIZAR E SALVAR LANÇAMENTOS</button>
        </div>
    </div>

    <!-- MODAL FORNECEDORES -->
    <div id="modalFornecedores" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close" onclick="fecharModal('modalFornecedores')">&times;</span>
            <h2>Cadastro de Fornecedores</h2>
            <input type="text" id="fornCod" placeholder="Código" style="width:30%; padding:8px">
            <input type="text" id="fornNome" placeholder="Nome do Fornecedor" style="width:65%; padding:8px">
            <button class="btn btn-novo" style="width:100%; margin-top:10px" onclick="cadastrarFornecedor()">Salvar Fornecedor</button>
            <div id="listaFornCadastrados" style="margin-top:15px"></div>
        </div>
    </div>

    <script>
        const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
        const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;

        let listaProdutosAPI = [];
        let fornecedores = JSON.parse(localStorage.getItem('fornecedores')) || [];
        let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
        let carrinhoTemporario = [];

        window.onload = () => {
            carregarDadosAPI();
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('filtroDataInicio').value = hoje;
            document.getElementById('filtroDataFim').value = hoje;
            renderizarTabela();
        };

        // --- INTEGRAÇÃO API ---
        async function carregarDadosAPI() {
            try {
                const res = await fetch(URL_DADOS);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                listaProdutosAPI = json.table.rows.map(r => ({
                    codigo: r.c[0] ? r.c[0].v.toString() : '',
                    nome: r.c[1] ? r.c[1].v : '',
                    preco: r.c[2] ? parseFloat(r.c[2].v) : 0
                }));
            } catch (e) { console.error("Erro API:", e); }
        }

        // --- MODAIS ---
        function abrirModalLancamento() {
            document.getElementById('modalLancamento').style.display = 'block';
            carrinhoTemporario = [];
            atualizarCarrinhoUI();
            document.getElementById('dataLote').value = new Date().toISOString().split('T')[0];
            document.getElementById('codFornecedor').value = "";
            document.getElementById('nomeFornecedor').innerText = "";
            limparCamposProduto();
        }

        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- BUSCAS ---
        function buscarFornecedor() {
            const termo = document.getElementById('codFornecedor').value.toLowerCase().trim();
            if(!termo) return;
            const f = fornecedores.find(i => i.id.toLowerCase() === termo || i.nome.toLowerCase().includes(termo));
            if(f) {
                document.getElementById('codFornecedor').value = f.id;
                document.getElementById('nomeFornecedor').innerText = f.nome;
                document.getElementById('codProduto').focus();
            } else {
                document.getElementById('nomeFornecedor').innerText = "Fornecedor não encontrado";
            }
        }

        function buscarProduto() {
            const termo = document.getElementById('codProduto').value.toLowerCase().trim();
            if(!termo) return;
            const p = listaProdutosAPI.find(i => i.codigo.toLowerCase() === termo || i.nome.toLowerCase().includes(termo));
            if(p) {
                document.getElementById('codProduto').value = p.codigo;
                document.getElementById('nomeProduto').innerText = p.nome;
                document.getElementById('vendaItem').value = p.preco;
                document.getElementById('qtdItem').focus();
            } else {
                document.getElementById('nomeProduto').innerText = "Não encontrado";
            }
        }

        // --- LÓGICA DO CARRINHO ---
        function adicionarAoCarrinho() {
            const codP = document.getElementById('codProduto').value;
            const nomeP = document.getElementById('nomeProduto').innerText;
            const qtd = parseFloat(document.getElementById('qtdItem').value);
            const custoUn = parseFloat(document.getElementById('custoItem').value) || 0;
            const vendaUn = parseFloat(document.getElementById('vendaItem').value) || 0;
            const gastoExUn = parseFloat(document.getElementById('gastoItem').value) || 0;

            if(!codP || isNaN(qtd) || qtd <= 0) {
                alert("Preencha produto e quantidade corretamente!");
                return;
            }

            // Cálculo: Lucro Unitário = Venda - (Custo + Gasto Extra)
            const lucroUn = vendaUn - (custoUn + gastoExUn);
            const custoTotalItem = (custoUn + gastoExUn) * qtd;
            const lucroTotalItem = lucroUn * qtd;

            carrinhoTemporario.push({
                codProduto: codP,
                nomeProduto: nomeP,
                qtd,
                custoUn,
                vendaUn,
                gastoExUn,
                custoTotalItem,
                lucroTotalItem,
                lucroUn
            });

            limparCamposProduto();
            atualizarCarrinhoUI();
            document.getElementById('codProduto').focus();
        }

        function atualizarCarrinhoUI() {
            const corpo = document.getElementById('corpoCarrinho');
            corpo.innerHTML = "";
            let totalCusto = 0;
            let totalLucro = 0;

            carrinhoTemporario.forEach((it, idx) => {
                totalCusto += it.custoTotalItem;
                totalLucro += it.lucroTotalItem;

                corpo.innerHTML += `
                    <tr>
                        <td><b>${it.codProduto}</b> - ${it.nomeProduto}</td>
                        <td>${it.qtd}</td>
                        <td>R$ ${it.custoUn.toFixed(2)}</td>
                        <td>R$ ${it.vendaUn.toFixed(2)}</td>
                        <td style="color:${it.lucroUn >= 0 ? 'green':'red'}">R$ ${it.lucroUn.toFixed(2)}</td>
                        <td style="font-weight:bold">R$ ${it.lucroTotalItem.toFixed(2)}</td>
                        <td><button class="btn-excluir" style="border:none; border-radius:4px; cursor:pointer" onclick="removerDoCarrinho(${idx})">✕</button></td>
                    </tr>
                `;
            });

            document.getElementById('resumoCustoLote').innerText = `R$ ${totalCusto.toFixed(2)}`;
            document.getElementById('resumoLucroLote').innerText = `R$ ${totalLucro.toFixed(2)}`;
        }

        function removerDoCarrinho(idx) {
            carrinhoTemporario.splice(idx, 1);
            atualizarCarrinhoUI();
        }

        function salvarLoteCompleto() {
            const data = document.getElementById('dataLote').value;
            const codF = document.getElementById('codFornecedor').value;
            const nomeF = document.getElementById('nomeFornecedor').innerText;

            if(!data || !codF || carrinhoTemporario.length === 0) {
                alert("Selecione data, fornecedor e adicione ao menos 1 produto!");
                return;
            }

            carrinhoTemporario.forEach(it => {
                lancamentos.unshift({
                    dataRAW: data,
                    dataBR: data.split('-').reverse().join('/'),
                    codFornecedor: codF,
                    nomeFornecedor: nomeF,
                    ...it,
                    lucro: it.lucroTotalItem // compatibilidade com tabela antiga
                });
            });

            localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
            renderizarTabela();
            fecharModal('modalLancamento');
            alert("Lote lançado com sucesso!");
        }

        function limparCamposProduto() {
            document.querySelectorAll('.campo-item').forEach(i => i.value = (i.id === 'gastoItem' ? "0" : ""));
            document.getElementById('nomeProduto').innerText = "";
        }

        // --- RENDERIZAÇÃO TABELA PRINCIPAL ---
        function renderizarTabela() {
            const tbody = document.getElementById('listaGeral');
            tbody.innerHTML = "";
            const fIn = document.getElementById('filtroDataInicio').value;
            const fFim = document.getElementById('filtroDataFim').value;

            lancamentos.forEach((it, idx) => {
                if(it.dataRAW >= fIn && it.dataRAW <= fFim) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><input type="checkbox" class="chk-item" value="${idx}"></td>
                        <td>${it.dataBR}</td>
                        <td>${it.nomeFornecedor}</td>
                        <td>${it.nomeProduto}</td>
                        <td align="center"><b>${it.qtd}</b></td>
                        <td>R$ ${it.custoUn.toFixed(2)}</td>
                        <td>R$ ${it.vendaUn.toFixed(2)}</td>
                        <td>R$ ${it.gastoExUn.toFixed(2)}</td>
                        <td>R$ ${it.custoTotalItem.toFixed(2)}</td>
                        <td style="font-weight:bold; color:${it.lucroTotalItem >=0 ? 'green':'red'}">R$ ${it.lucroTotalItem.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao btn-excluir" onclick="excluirLancamento(${idx})">✖</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        function excluirLancamento(idx) {
            if(confirm("Excluir este item permanentemente?")) {
                lancamentos.splice(idx, 1);
                localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
                renderizarTabela();
            }
        }

        function selecionarTodos() {
            const m = document.getElementById('chkTodos').checked;
            document.querySelectorAll('.chk-item').forEach(c => c.checked = m);
        }

        // --- FORNECEDORES ---
        function abrirModalFornecedor() {
            document.getElementById('modalFornecedores').style.display = 'block';
            listarFornecedores();
        }

        function cadastrarFornecedor() {
            const id = document.getElementById('fornCod').value;
            const nome = document.getElementById('fornNome').value;
            if(!id || !nome) return;
            fornecedores.push({id, nome});
            localStorage.setItem('fornecedores', JSON.stringify(fornecedores));
            listarFornecedores();
            document.getElementById('fornCod').value = "";
            document.getElementById('fornNome').value = "";
        }

        function listarFornecedores() {
            const div = document.getElementById('listaFornCadastrados');
            div.innerHTML = fornecedores.map((f, i) => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee">
                    <span>${f.id} - ${f.nome}</span>
                    <button onclick="fornecedores.splice(${i},1); localStorage.setItem('fornecedores', JSON.stringify(fornecedores)); listarFornecedores()" style="color:red; border:none; background:none; cursor:pointer">Remover</button>
                </div>
            `).join('');
        }

        // --- IMPRESSÃO ---
        function imprimirSelecionados() {
            const marcados = document.querySelectorAll('.chk-item:checked');
            if(marcados.length === 0) return alert("Selecione itens na tabela!");
            
            let html = `<h2>Relatório de Lançamentos Colméia</h2><table border="1" style="width:100%; border-collapse:collapse">
                <tr><th>Data</th><th>Fornecedor</th><th>Produto</th><th>Qtd</th><th>Custo Tot</th><th>Lucro Tot</th></tr>`;
            
            let totalL = 0;
            marcados.forEach(c => {
                const it = lancamentos[c.value];
                totalL += it.lucroTotalItem;
                html += `<tr><td>${it.dataBR}</td><td>${it.nomeFornecedor}</td><td>${it.nomeProduto}</td><td>${it.qtd}</td><td>R$ ${it.custoTotalItem.toFixed(2)}</td><td>R$ ${it.lucroTotalItem.toFixed(2)}</td></tr>`;
            });
            
            html += `</table><h3>Lucro Total dos Selecionados: R$ ${totalL.toFixed(2)}</h3>`;
            const win = window.open('', '', 'width=900,height=600');
            win.document.write(html);
            win.document.close();
            win.print();
        }

        // Atalhos de Teclado
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && document.getElementById('modalLancamento').style.display === 'block') {
                if(document.activeElement.id === 'gastoItem') adicionarAoCarrinho();
            }
        });
    </script>
</body>
</html>
