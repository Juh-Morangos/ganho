<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Colméia v3 - Edição e Lucro Un.</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: #1a73e8; color: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 15px; }
        main { max-width: 1400px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .controles { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        .btn { border: none; padding: 10px 20px; font-size: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; color: white; text-decoration: none; text-align: center; }
        .btn-novo { background-color: #34a853; }
        .btn-salvar { background-color: #1a73e8; width: 100%; padding: 15px; margin-top: 15px; font-size: 18px; }
        
        .btn-acao { padding: 6px 10px; font-size: 13px; margin-right: 3px; border-radius: 4px; border: none; cursor: pointer; color: white; display: inline-flex; align-items: center; justify-content: center; min-width: 35px; }
        .btn-cupom { background-color: #17a2b8; }
        .btn-editar { background-color: #fbbc05; color: #333; }
        .btn-excluir { background-color: #ea4335; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #5f6368; text-transform: uppercase; font-size: 11px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 25px; width: 95%; max-width: 1000px; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: #5f6368; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; }
        
        .info-busca { display: block; font-size: 12px; color: #1a73e8; margin-top: 4px; font-weight: bold; }
        .carrinho-container { margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; max-height: 250px; overflow-y: auto; }
        .resultado-lucro { background-color: #e6f4ea; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin: 0; font-size: 22px;">Sistema Colméia - Gestão Completa</h1>
    </header>

    <main>
        <div class="controles">
            <div>
                <input type="date" id="filtroDataInicio" onchange="renderizarTabela()"> até 
                <input type="date" id="filtroDataFim" onchange="renderizarTabela()">
            </div>
            <div class="controles-acoes">
                <button class="btn btn-novo" onclick="abrirModalLancamento()">+ Iniciar Novo Lote</button>
            </div>
        </div>

        <table id="tabelaPrincipal">
            <thead>
                <tr>
                    <th width="30"><input type="checkbox" id="chkTodos" onchange="selecionarTodos()"></th>
                    <th>Data</th>
                    <th>Fornecedor</th>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Custo Un.</th>
                    <th>Venda Un.</th>
                    <th>Gasto Ex.</th>
                    <th style="color: #1a73e8;">Lucro Un.</th>
                    <th>Lucro Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaGeral"></tbody>
        </table>
    </main>

    <!-- MODAL DE LANÇAMENTO -->
    <div id="modalLancamento" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalLancamento')">&times;</span>
            <h2 id="tituloModal" style="color: #1a73e8;">Novo Lote</h2>
            
            <input type="hidden" id="editIndexGlobal" value="">

            <div class="form-grid" style="margin-bottom: 20px; background: #fff;">
                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="dataLote" class="input-nav">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Fornecedor:</label>
                    <input type="text" id="codFornecedor" class="input-nav" onblur="buscarFornecedor()">
                    <span id="nomeFornecedor" class="info-busca"></span>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Produto:</label>
                    <input type="text" id="codProduto" class="input-nav" onblur="buscarProduto()">
                    <span id="nomeProduto" class="info-busca"></span>
                </div>
                <div class="form-group">
                    <label>Qtd:</label>
                    <input type="number" id="qtdItem" class="input-nav">
                </div>
                <div class="form-group">
                    <label>Custo Un:</label>
                    <input type="number" id="custoItem" class="input-nav" step="0.01">
                </div>
                <div class="form-group">
                    <label>Venda Un:</label>
                    <input type="number" id="vendaItem" class="input-nav" step="0.01">
                </div>
                <div class="form-group">
                    <label>Gasto Ex:</label>
                    <input type="number" id="gastoItem" class="input-nav" step="0.01" value="0">
                </div>
                <div class="form-group" style="display:flex; align-items:flex-end;">
                    <button type="button" id="btnAcaoInterna" class="btn btn-novo" style="width:100%" onclick="adicionarAoCarrinho()">+ Adicionar</button>
                </div>
            </div>

            <div class="carrinho-container" id="areaCarrinho">
                <table>
                    <thead>
                        <tr style="background:#eee">
                            <th>Produto</th>
                            <th>Qtd</th>
                            <th>Custo Tot</th>
                            <th>Lucro Un</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="corpoCarrinho"></tbody>
                </table>
            </div>

            <button class="btn btn-salvar" id="btnFinalizar" onclick="salvarLoteCompleto()">SALVAR LANÇAMENTOS</button>
        </div>
    </div>

    <script>
        const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
        const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;

        let listaProdutosAPI = [];
        let fornecedores = JSON.parse(localStorage.getItem('fornecedores')) || [];
        let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
        let carrinhoTemporario = [];

        window.onload = () => {
            carregarDadosAPI();
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('filtroDataInicio').value = hoje;
            document.getElementById('filtroDataFim').value = hoje;
            renderizarTabela();
        };

        async function carregarDadosAPI() {
            try {
                const res = await fetch(URL_DADOS);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
                listaProdutosAPI = json.table.rows.map(r => ({
                    codigo: r.c[0] ? r.c[0].v.toString() : '',
                    nome: r.c[1] ? r.c[1].v : '',
                    preco: r.c[2] ? parseFloat(r.c[2].v) : 0
                }));
            } catch (e) { console.error("Erro API:", e); }
        }

        // Navegação Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const nav = Array.from(document.querySelectorAll('.input-nav'));
                const idx = nav.indexOf(document.activeElement);
                if (idx > -1) {
                    e.preventDefault();
                    if (document.activeElement.id === 'gastoItem') {
                        adicionarAoCarrinho();
                    } else {
                        nav[idx + 1].focus();
                    }
                }
            }
        });

        function abrirModalLancamento() {
            document.getElementById('modalLancamento').style.display = 'block';
            document.getElementById('tituloModal').innerText = "Novo Lote";
            document.getElementById('editIndexGlobal').value = "";
            document.getElementById('areaCarrinho').style.display = 'block';
            document.getElementById('btnFinalizar').style.display = 'block';
            document.getElementById('btnAcaoInterna').innerText = "+ Adicionar";
            carrinhoTemporario = [];
            atualizarCarrinhoUI();
            document.getElementById('dataLote').value = new Date().toISOString().split('T')[0];
            setTimeout(() => document.getElementById('codFornecedor').focus(), 100);
        }

        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        function buscarFornecedor() {
            const t = document.getElementById('codFornecedor').value.toLowerCase().trim();
            if(!t) return;
            const f = fornecedores.find(i => i.id.toLowerCase() === t || i.nome.toLowerCase().includes(t));
            if(f) {
                document.getElementById('codFornecedor').value = f.id;
                document.getElementById('nomeFornecedor').innerText = f.nome;
            } else document.getElementById('nomeFornecedor').innerText = "Não cadastrado";
        }

        function buscarProduto() {
            const t = document.getElementById('codProduto').value.toLowerCase().trim();
            if(!t) return;
            const p = listaProdutosAPI.find(i => i.codigo.toLowerCase() === t || i.nome.toLowerCase().includes(t));
            if(p) {
                document.getElementById('codProduto').value = p.codigo;
                document.getElementById('nomeProduto').innerText = p.nome;
                document.getElementById('vendaItem').value = p.preco;
            } else document.getElementById('nomeProduto').innerText = "Não encontrado";
        }

        function adicionarAoCarrinho() {
            const cp = document.getElementById('codProduto').value;
            const np = document.getElementById('nomeProduto').innerText;
            const qt = parseFloat(document.getElementById('qtdItem').value);
            const ci = parseFloat(document.getElementById('custoItem').value) || 0;
            const vi = parseFloat(document.getElementById('vendaItem').value) || 0;
            const gi = parseFloat(document.getElementById('gastoItem').value) || 0;

            if(!cp || !qt) return alert("Preencha Produto e Qtd!");

            const lUn = vi - (ci + gi);
            const item = {
                codProduto: cp, nomeProduto: np, qtd: qt, custoUn: ci, vendaUn: vi, gastoExUn: gi, 
                custoTotalItem: (ci + gi) * qt, lucroTotalItem: lUn * qt, lucroUn: lUn
            };

            // Se for uma edição de item único da tabela principal
            const idxEdit = document.getElementById('editIndexGlobal').value;
            if(idxEdit !== "") {
                const dt = document.getElementById('dataLote').value;
                const cf = document.getElementById('codFornecedor').value;
                const nf = document.getElementById('nomeFornecedor').innerText;
                lancamentos[idxEdit] = { dataRAW: dt, dataBR: dt.split('-').reverse().join('/'), codFornecedor: cf, nomeFornecedor: nf, ...item, lucro: item.lucroTotalItem };
                localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
                renderizarTabela();
                fecharModal('modalLancamento');
                return;
            }

            carrinhoTemporario.push(item);
            limparCamposProduto();
            atualizarCarrinhoUI();
            document.getElementById('codProduto').focus();
        }

        function atualizarCarrinhoUI() {
            const corpo = document.getElementById('corpoCarrinho');
            corpo.innerHTML = "";
            carrinhoTemporario.forEach((it, idx) => {
                corpo.innerHTML += `<tr><td>${it.nomeProduto}</td><td>${it.qtd}</td><td>R$ ${it.custoTotalItem.toFixed(2)}</td><td>R$ ${it.lucroUn.toFixed(2)}</td><td><button class="btn-excluir" onclick="carrinhoTemporario.splice(${idx},1); atualizarCarrinhoUI()">✕</button></td></tr>`;
            });
        }

        function salvarLoteCompleto() {
            const dt = document.getElementById('dataLote').value;
            const cf = document.getElementById('codFornecedor').value;
            const nf = document.getElementById('nomeFornecedor').innerText;
            if(!dt || !cf || carrinhoTemporario.length === 0) return alert("Dados incompletos!");

            carrinhoTemporario.forEach(it => {
                lancamentos.unshift({ dataRAW: dt, dataBR: dt.split('-').reverse().join('/'), codFornecedor: cf, nomeFornecedor: nf, ...it, lucro: it.lucroTotalItem });
            });
            localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
            renderizarTabela();
            fecharModal('modalLancamento');
        }

        function alterarLancamento(idx) {
            const it = lancamentos[idx];
            document.getElementById('modalLancamento').style.display = 'block';
            document.getElementById('tituloModal').innerText = "Alterar Lançamento";
            document.getElementById('editIndexGlobal').value = idx;
            
            // Esconde carrinho para edição única
            document.getElementById('areaCarrinho').style.display = 'none';
            document.getElementById('btnFinalizar').style.display = 'none';
            document.getElementById('btnAcaoInterna').innerText = "Atualizar Item";

            document.getElementById('dataLote').value = it.dataRAW;
            document.getElementById('codFornecedor').value = it.codFornecedor;
            document.getElementById('nomeFornecedor').innerText = it.nomeFornecedor;
            document.getElementById('codProduto').value = it.codProduto;
            document.getElementById('nomeProduto').innerText = it.nomeProduto;
            document.getElementById('qtdItem').value = it.qtd;
            document.getElementById('custoItem').value = it.custoUn;
            document.getElementById('vendaItem').value = it.vendaUn;
            document.getElementById('gastoItem').value = it.gastoExUn;
        }

        function renderizarTabela() {
            const tbody = document.getElementById('listaGeral');
            tbody.innerHTML = "";
            const fi = document.getElementById('filtroDataInicio').value;
            const ff = document.getElementById('filtroDataFim').value;

            lancamentos.forEach((it, idx) => {
                if(it.dataRAW >= fi && it.dataRAW <= ff) {
                    tbody.innerHTML += `<tr>
                        <td><input type="checkbox" class="chk-item" value="${idx}"></td>
                        <td>${it.dataBR}</td><td>${it.nomeFornecedor}</td><td>${it.nomeProduto}</td>
                        <td>${it.qtd}</td><td>R$ ${it.custoUn.toFixed(2)}</td><td>R$ ${it.vendaUn.toFixed(2)}</td>
                        <td>R$ ${it.gastoExUn.toFixed(2)}</td>
                        <td style="font-weight:bold; color:#1a73e8">R$ ${it.lucroUn.toFixed(2)}</td>
                        <td style="font-weight:bold; color:${it.lucroTotalItem >=0 ? 'green':'red'}">R$ ${it.lucroTotalItem.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="alterarLancamento(${idx})">✎</button>
                            <button class="btn-acao btn-cupom" onclick="imprimirCupom(${idx})">🎫</button>
                            <button class="btn-acao btn-excluir" onclick="if(confirm('Excluir?')) {lancamentos.splice(${idx},1); localStorage.setItem('lancamentos', JSON.stringify(lancamentos)); renderizarTabela();}">✖</button>
                        </td>
                    </tr>`;
                }
            });
        }

        function imprimirCupom(idx) {
            const it = lancamentos[idx];
            const win = window.open('', '', 'width=300,height=600');
            win.document.write(`<html><body style="width:80mm; font-family:monospace;"><h3>SISTEMA COLMÉIA</h3><hr>${it.dataBR}<br>${it.nomeProduto}<br>QTD: ${it.qtd}<br>TOTAL: R$ ${(it.vendaUn * it.qtd).toFixed(2)}<hr></body></html>`);
            win.document.close();
            win.print();
            win.close();
        }

        function limparCamposProduto() {
            document.getElementById('codProduto').value = ""; document.getElementById('nomeProduto').innerText = "";
            document.getElementById('qtdItem').value = ""; document.getElementById('custoItem').value = "";
            document.getElementById('vendaItem').value = ""; document.getElementById('gastoItem').value = "0";
        }

        function selecionarTodos() { const m = document.getElementById('chkTodos').checked; document.querySelectorAll('.chk-item').forEach(c => c.checked = m); }
    </script>
</body>
</html>
