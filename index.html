<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Colméia v7.0 - Estável</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }
        
        /* Header */
        header { background-color: #1a73e8; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Layout Principal */
        main { max-width: 98%; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Barra de Ferramentas */
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .filtros { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* Botões */
        .btn { border: none; padding: 10px 15px; font-size: 13px; cursor: pointer; border-radius: 6px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-novo { background-color: #34a853; }
        .btn-comprador { background-color: #ff6b6b; }
        .btn-fornecedor { background-color: #fbbc05; color: #333; }
        .btn-imprimir { background-color: #6c757d; }
        .btn-acao { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; color: white; margin-right: 2px; }
        .btn-editar { background-color: #fbbc05; color: #333; }
        .btn-excluir { background-color: #ea4335; }
        .btn-cupom { background-color: #17a2b8; }

        /* Tabela Principal */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f1f3f4; color: #5f6368; font-size: 11px; text-transform: uppercase; }
        tr:hover { background-color: #fcfcfc; }

        /* Modais */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; }
        .modal-content { background: #fff; margin: 2% auto; padding: 25px; width: 95%; max-width: 1200px; border-radius: 12px; position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #666; }

        /* Formulários no Modal */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 15px; padding: 15px; background: #fff; border: 1px solid #eef0f2; border-radius: 8px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }

        /* Carrinho dentro do Modal */
        .carrinho-box { margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .carrinho-box table { margin-top: 0; }
        .carrinho-box thead { background: #f8f9fa; }
        .carrinho-scroll { max-height: 200px; overflow-y: auto; }

        .btn-finalizar { background-color: #1a73e8; width: 100%; padding: 18px; margin-top: 20px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/cCj4sBRm/branco.png" alt="Logo" style="height: 40px;">
    <h1 style="margin:0; font-size: 20px;">Sistema Colméia - ERP v7.0</h1>
</header>

<main>
    <div class="toolbar">
        <div class="filtros">
            <input type="date" id="filtroDataIn"> 
            <span>até</span>
            <input type="date" id="filtroDataFim">
            <select id="filtroComp" onchange="renderizarTabela()"><option value="">Todos Compradores</option></select>
            <select id="filtroForn" onchange="renderizarTabela()"><option value="">Todos Fornecedores</option></select>
        </div>
        <div class="controles-acoes">
            <button class="btn btn-imprimir" onclick="imprimirLista()">🖨️ Lista</button>
            <button class="btn btn-comprador" onclick="abrirModalBasico('compradores')">👤 Compradores</button>
            <button class="btn btn-fornecedor" onclick="abrirModalBasico('fornecedores')">👥 Fornecedores</button>
            <button class="btn btn-novo" onclick="abrirModalLote()">+ Novo Lote</button>
        </div>
    </div>

    <table id="tabelaPrincipal">
        <thead>
            <tr>
                <th width="30"><input type="checkbox" id="chkTodos" onchange="selecionarTodos()"></th>
                <th>Data</th>
                <th>Comprador</th>
                <th>Fornecedor</th>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Custo Un.</th>
                <th>Venda Un.</th>
                <th style="color:#1a73e8">Lucro Un.</th>
                <th>Lucro Total</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabelaPrincipal"></tbody>
    </table>
</main>

<!-- MODAL DE LANÇAMENTO (BASIADO NA IMAGE_A30192.PNG) -->
<div id="modalLote" class="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal('modalLote')">&times;</span>
        <h2 id="modalTitulo" style="color: #1a73e8; margin-top:0;">Novo Lote</h2>
        
        <input type="hidden" id="editIndexGlobal" value="">

        <!-- Linha 1: Dados do Lote -->
        <div class="form-grid">
            <div class="form-group">
                <label>Data:</label>
                <input type="date" id="loteData" class="nav">
            </div>
            <div class="form-group">
                <label>Comprador:</label>
                <select id="loteComprador" class="nav"></select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Fornecedor (Cód ou Nome):</label>
                <input type="text" id="loteFornecedor" class="nav" onblur="buscarFornManual()">
                <span id="nomeFornDisplay" style="font-size:11px; color:#1a73e8; font-weight:bold"></span>
            </div>
        </div>

        <!-- Linha 2: Dados do Produto -->
        <div class="form-grid" style="background:#fff; border: 1px solid #ddd;">
            <div class="form-group" style="grid-column: span 2;">
                <label>Produto:</label>
                <input type="text" id="prodBusca" class="nav" onblur="buscarProdManual()">
                <span id="nomeProdDisplay" style="font-size:11px; color:#1a73e8; font-weight:bold"></span>
            </div>
            <div class="form-group">
                <label>Qtd:</label>
                <input type="number" id="prodQtd" class="nav">
            </div>
            <div class="form-group">
                <label>Custo Un:</label>
                <input type="number" id="prodCusto" class="nav" step="0.01">
            </div>
            <div class="form-group">
                <label>Venda Un:</label>
                <input type="number" id="prodVenda" class="nav" step="0.01">
            </div>
            <div class="form-group">
                <label>Gasto Ex:</label>
                <input type="number" id="prodGasto" class="nav" step="0.01" value="0">
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <button type="button" id="btnAddItem" class="btn btn-novo" style="width:100%" onclick="acaoBotaoItem()">+ Adicionar</button>
            </div>
        </div>

        <!-- Carrinho Detalhado -->
        <div class="carrinho-box" id="boxCarrinho">
            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Custo Un</th>
                        <th>Venda Un</th>
                        <th>Gasto Ex</th>
                        <th style="color:#1a73e8">Lucro Un</th>
                        <th>Lucro Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="corpoCarrinhoModal"></tbody>
            </table>
        </div>

        <button class="btn btn-finalizar" id="btnSalvarTudo" onclick="finalizarLote()">Gravar Lançamentos</button>
    </div>
</div>

<!-- MODAL BÁSICO (CADASTROS) -->
<div id="modalBasico" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <span class="close" onclick="fecharModal('modalBasico')">&times;</span>
        <h2 id="tituloBasico">Cadastro</h2>
        <div id="formBasico"></div>
        <div id="listaBasica" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</div>

<script>
    // Configurações e Dados
    const PLANILHA_ID = '1cl89xjWPjxyULh4Jw5XZc89uO057pDPaivUKSCiy-xM';
    const URL_DADOS = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tq=SELECT A, B, E`;
    
    let produtosAPI = [];
    let fornecedores = JSON.parse(localStorage.getItem('fornecedores')) || [];
    let compradores = JSON.parse(localStorage.getItem('compradores')) || [];
    let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
    let carrinho = [];

    window.onload = async () => {
        carregarAPI();
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('filtroDataIn').value = hoje;
        document.getElementById('filtroDataFim').value = hoje;
        atualizarSelects();
        renderizarTabela();
    };

    async function carregarAPI() {
        try {
            const res = await fetch(URL_DADOS);
            const text = await res.text();
            const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
            produtosAPI = json.table.rows.map(r => ({
                cod: r.c[0] ? r.c[0].v.toString() : '',
                nome: r.c[1] ? r.c[1].v : '',
                preco: r.c[2] ? parseFloat(r.c[2].v) : 0
            }));
        } catch(e) { console.error("Erro na Planilha", e); }
    }

    // Navegação por Enter
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            const inputs = Array.from(document.querySelectorAll('.nav'));
            const idx = inputs.indexOf(document.activeElement);
            if(idx > -1) {
                e.preventDefault();
                if(document.activeElement.id === 'prodGasto') acaoBotaoItem();
                else if(inputs[idx+1]) inputs[idx+1].focus();
            }
        }
    });

    // Funções do Modal de Lote
    function abrirModalLote() {
        document.getElementById('modalLote').style.display = 'block';
        document.getElementById('modalTitulo').innerText = "Novo Lote";
        document.getElementById('editIndexGlobal').value = "";
        document.getElementById('boxCarrinho').style.display = 'block';
        document.getElementById('btnSalvarTudo').style.display = 'block';
        document.getElementById('btnAddItem').innerText = "+ Adicionar";
        
        carrinho = [];
        atualizarCarrinhoUI();
        limparCamposProd();
        
        document.getElementById('loteData').value = new Date().toISOString().split('T')[0];
        setTimeout(() => document.getElementById('loteComprador').focus(), 100);
    }

    function buscarFornManual() {
        const t = document.getElementById('loteFornecedor').value.toLowerCase().trim();
        const f = fornecedores.find(i => i.id.toLowerCase() === t || i.nome.toLowerCase().includes(t));
        document.getElementById('nomeFornDisplay').innerText = f ? f.nome : "Não cadastrado";
    }

    function buscarProdManual() {
        const t = document.getElementById('prodBusca').value.toLowerCase().trim();
        const p = produtosAPI.find(i => i.cod.toLowerCase() === t || i.nome.toLowerCase().includes(t));
        if(p) {
            document.getElementById('prodBusca').value = p.cod;
            document.getElementById('nomeProdDisplay').innerText = p.nome;
            document.getElementById('prodVenda').value = p.preco;
        }
    }

    function acaoBotaoItem() {
        const idxEdit = document.getElementById('editIndexGlobal').value;
        const cod = document.getElementById('prodBusca').value;
        const nome = document.getElementById('nomeProdDisplay').innerText;
        const qtd = parseFloat(document.getElementById('prodQtd').value);
        const custo = parseFloat(document.getElementById('prodCusto').value) || 0;
        const venda = parseFloat(document.getElementById('prodVenda').value) || 0;
        const gasto = parseFloat(document.getElementById('prodGasto').value) || 0;

        if(!cod || !qtd) return alert("Produto e Qtd obrigatórios!");

        const lUn = venda - (custo + gasto);
        const lTot = lUn * qtd;
        
        const itemObj = { cod, nome, qtd, custo, venda, gasto, lucroUn: lUn, lucroTotal: lTot };

        if(idxEdit !== "") {
            // Lógica de Edição Direta na Tabela
            const dt = document.getElementById('loteData').value;
            lancamentos[idxEdit] = {
                ...itemObj,
                dataRAW: dt,
                dataBR: dt.split('-').reverse().join('/'),
                comprador: document.getElementById('loteComprador').value,
                fornecedor: document.getElementById('nomeFornDisplay').innerText
            };
            localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
            renderizarTabela();
            fecharModal('modalLote');
        } else {
            // Lógica de Carrinho
            carrinho.push(itemObj);
            atualizarCarrinhoUI();
            limparCamposProd();
            document.getElementById('prodBusca').focus();
        }
    }

    function atualizarCarrinhoUI() {
        const tbody = document.getElementById('corpoCarrinhoModal');
        tbody.innerHTML = carrinho.map((it, idx) => `
            <tr>
                <td>${it.nome}</td>
                <td>${it.qtd}</td>
                <td>R$ ${it.custo.toFixed(2)}</td>
                <td>R$ ${it.venda.toFixed(2)}</td>
                <td>R$ ${it.gasto.toFixed(2)}</td>
                <td style="color:#1a73e8; font-weight:bold">R$ ${it.lucroUn.toFixed(2)}</td>
                <td style="font-weight:bold">R$ ${it.lucroTotal.toFixed(2)}</td>
                <td><button class="btn-excluir" onclick="carrinho.splice(${idx},1); atualizarCarrinhoUI()">✕</button></td>
            </tr>
        `).join('');
    }

    function finalizarLote() {
        const dt = document.getElementById('loteData').value;
        const comp = document.getElementById('loteComprador').value;
        const forn = document.getElementById('nomeFornDisplay').innerText;

        if(!dt || !comp || carrinho.length === 0) return alert("Preencha todos os dados do lote!");

        carrinho.forEach(it => {
            lancamentos.unshift({
                ...it,
                dataRAW: dt,
                dataBR: dt.split('-').reverse().join('/'),
                comprador: comp,
                fornecedor: forn
            });
        });

        localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
        renderizarTabela();
        fecharModal('modalLote');
    }

    function alterarLancamento(idx) {
        const it = lancamentos[idx];
        abrirModalLote();
        document.getElementById('modalTitulo').innerText = "Alterar Item";
        document.getElementById('editIndexGlobal').value = idx;
        document.getElementById('boxCarrinho').style.display = 'none';
        document.getElementById('btnSalvarTudo').style.display = 'none';
        document.getElementById('btnAddItem').innerText = "Confirmar Alteração";

        document.getElementById('loteData').value = it.dataRAW;
        document.getElementById('loteComprador').value = it.comprador;
        document.getElementById('loteFornecedor').value = ""; // Busca manual requerida ou ID salvo
        document.getElementById('nomeFornDisplay').innerText = it.fornecedor;
        document.getElementById('prodBusca').value = it.cod;
        document.getElementById('nomeProdDisplay').innerText = it.nome;
        document.getElementById('prodQtd').value = it.qtd;
        document.getElementById('prodCusto').value = it.custo;
        document.getElementById('prodVenda').value = it.venda;
        document.getElementById('prodGasto').value = it.gasto;
    }

    // Funções da Tabela Principal
    function renderizarTabela() {
        const tbody = document.getElementById('corpoTabelaPrincipal');
        tbody.innerHTML = "";
        const fIn = document.getElementById('filtroDataIn').value;
        const fFim = document.getElementById('filtroDataFim').value;
        const sComp = document.getElementById('filtroComp').value;
        const sForn = document.getElementById('filtroForn').value;

        lancamentos.forEach((it, idx) => {
            if(it.dataRAW >= fIn && it.dataRAW <= fFim && (!sComp || it.comprador === sComp) && (!sForn || it.fornecedor === sForn)) {
                tbody.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="chk-item" value="${idx}"></td>
                        <td>${it.dataBR}</td>
                        <td style="color:#ff6b6b; font-weight:bold">${it.comprador}</td>
                        <td>${it.fornecedor}</td>
                        <td>${it.nome}</td>
                        <td>${it.qtd}</td>
                        <td>R$ ${it.custo.toFixed(2)}</td>
                        <td>R$ ${it.venda.toFixed(2)}</td>
                        <td style="color:#1a73e8; font-weight:bold">R$ ${it.lucroUn.toFixed(2)}</td>
                        <td style="color:${it.lucroTotal>=0?'green':'red'}; font-weight:bold">R$ ${it.lucroTotal.toFixed(2)}</td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="alterarLancamento(${idx})">✎</button>
                            <button class="btn-acao btn-cupom" onclick="imprimirCupom(${idx})">🎫</button>
                            <button class="btn-acao btn-excluir" onclick="excluirItem(${idx})">✖</button>
                        </td>
                    </tr>
                `;
            }
        });
    }

    // Outros Utilitários
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
    function limparCamposProd() { document.getElementById('prodBusca').value = ""; document.getElementById('nomeProdDisplay').innerText = ""; document.getElementById('prodQtd').value = ""; document.getElementById('prodCusto').value = ""; document.getElementById('prodVenda').value = ""; document.getElementById('prodGasto').value = "0"; }
    function excluirItem(idx) { if(confirm("Deseja excluir?")) { lancamentos.splice(idx,1); localStorage.setItem('lancamentos', JSON.stringify(lancamentos)); renderizarTabela(); } }
    function atualizarSelects() {
        const cSel = document.getElementById('loteComprador');
        const cfSel = document.getElementById('filtroComp');
        const ffSel = document.getElementById('filtroForn');
        const htmlC = '<option value="">Selecione...</option>' + compradores.map(i => `<option value="${i.nome}">${i.nome}</option>`).join('');
        cSel.innerHTML = htmlC;
        cfSel.innerHTML = '<option value="">Todos Compradores</option>' + compradores.map(i => `<option value="${i.nome}">${i.nome}</option>`).join('');
        ffSel.innerHTML = '<option value="">Todos Fornecedores</option>' + fornecedores.map(i => `<option value="${i.nome}">${i.nome}</option>`).join('');
    }

    // Modal de Cadastros Simples
    function abrirModalBasico(tipo) {
        document.getElementById('modalBasico').style.display = 'block';
        const titulo = tipo === 'compradores' ? "Compradores" : "Fornecedores";
        document.getElementById('tituloBasico').innerText = "Gestão de " + titulo;
        
        const placeholder = tipo === 'compradores' ? "Nome do Comprador" : "Nome do Fornecedor";
        const extra = tipo === 'fornecedores' ? `<input type="text" id="cadID" placeholder="Código" style="margin-bottom:10px">` : "";
        
        document.getElementById('formBasico').innerHTML = `
            ${extra}
            <input type="text" id="cadNome" placeholder="${placeholder}">
            <button class="btn btn-novo" style="width:100%; margin-top:10px" onclick="salvarCadastro('${tipo}')">Gravar</button>
        `;
        listarBasico(tipo);
    }

    function salvarCadastro(tipo) {
        const nome = document.getElementById('cadNome').value;
        const id = document.getElementById('cadID') ? document.getElementById('cadID').value : Date.now().toString();
        if(!nome) return;
        
        const lista = tipo === 'compradores' ? compradores : fornecedores;
        lista.push({id, nome});
        localStorage.setItem(tipo, JSON.stringify(lista));
        atualizarSelects();
        listarBasico(tipo);
    }

    function listarBasico(tipo) {
        const lista = tipo === 'compradores' ? compradores : fornecedores;
        document.getElementById('listaBasica').innerHTML = lista.map((i, idx) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                <span>${i.nome}</span>
                <button onclick="removerBasico('${tipo}', ${idx})" style="color:red; border:none; background:none; cursor:pointer">X</button>
            </div>
        `).join('');
    }

    function removerBasico(tipo, idx) {
        const lista = tipo === 'compradores' ? compradores : fornecedores;
        lista.splice(idx, 1);
        localStorage.setItem(tipo, JSON.stringify(lista));
        atualizarSelects();
        listarBasico(tipo);
    }

    function imprimirCupom(idx) {
        const it = lancamentos[idx];
        const win = window.open('', '', 'width=300');
        win.document.write(`CUPOM: ${it.nome} | TOTAL: R$ ${(it.venda * it.qtd).toFixed(2)}`);
        win.print(); win.close();
    }
</script>
</body>
</html>
